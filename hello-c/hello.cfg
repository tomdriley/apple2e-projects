FEATURES {
    STARTADDRESS: default = $0800;
}
SYMBOLS {
    __STACKSIZE__:  type = weak, value = $0800;   # 2k C stack
    __STACKSTART__: type = weak, value = $8000;    # C stack grows down from here
    __ZPSTART__:    type = weak, value = $0080;     # cc65 zero page (above monitor's)
}
MEMORY {
    ZP:   file = "", define = yes, start = __ZPSTART__, size = $001F;
    MAIN: file = %O,               start = %S,          size = __STACKSTART__ - __STACKSIZE__ - %S;
}
SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    STARTUP:  load = MAIN, type = ro;     # crt0: boot-count byte must come first
    CODE:     load = MAIN, type = ro;
    RODATA:   load = MAIN, type = ro;
    DATA:     load = MAIN, type = rw;     # loaded in place in RAM, no copy needed
    BSS:      load = MAIN, type = bss, define = yes;
}
