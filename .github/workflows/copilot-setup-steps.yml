name: "Copilot Setup Steps"

# Pre-provisions the Copilot cloud agent's environment with the same pinned
# toolchain used by CI and Codespaces (dev == CI == agent). Runs automatically
# when the setup or toolchain scripts change so it is easy to validate, and can
# be run on demand from the Actions tab.
#
# NOTE: to take effect for the agent, this file must be on the default branch,
# and the job MUST be named `copilot-setup-steps`.
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - scripts/setup-toolchain.sh
      - scripts/provision-roms.sh
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - scripts/setup-toolchain.sh
      - scripts/provision-roms.sh

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    permissions:
      contents: read
    env:
      MAME: /usr/local/bin/mame
      NONELIB: /opt/cc65/share/cc65/lib/none.lib
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install pinned toolchain (cc65 + MAME + AppleCommander + pyte)
        run: bash scripts/setup-toolchain.sh

      # The MAME conformance suite needs the private Apple IIe ROMs. Decode them
      # from the secret into a fixed path. This is mandatory: the agent verifies
      # every change by booting the real firmware, so a missing ROM secret must
      # fail setup loudly rather than leave the agent able to run only ROM-free
      # checks.
      - name: Provision Apple IIe ROMs
        env:
          MAME_ROMS_TGZ_B64: ${{ secrets.MAME_ROMS_TGZ_B64 }}
        run: |
          set -euo pipefail
          if [ -z "${MAME_ROMS_TGZ_B64:-}" ]; then
            echo "::error::MAME_ROMS_TGZ_B64 secret is not set for this environment." \
                 "The Copilot agent needs the private Apple IIe ROMs to boot the" \
                 "firmware and verify changes. Add the secret to the 'copilot'" \
                 "environment (see vt100-term-c/docs/TESTING.md)." >&2
            exit 1
          fi
          romp="$(bash scripts/provision-roms.sh /opt/mame-roms)"
          echo "MAME_ROMPATH=$romp" >> "$GITHUB_ENV"
          echo "Provisioned Apple IIe ROMs at $romp"
