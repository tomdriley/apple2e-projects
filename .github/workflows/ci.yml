name: CI

# Regression gate for the Apple IIe VT100 terminal firmware (issue #22).
#   Tier 1 (hermetic): builds the firmware with the pinned cc65 toolchain and
#                      runs the ROM-free conformance selftest + pyte oracle audit.
#                      Runs on every push/PR, including fork PRs.
#   Tier 2 (real MAME): boots the firmware in headless MAME against the actual
#                       Apple IIe firmware ROMs and runs the full conformance
#                       suite. Requires the private ROM secret, so it is skipped
#                       automatically when the secret is unavailable (fork PRs).
on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Toolchain locations produced by scripts/setup-toolchain.sh (pinned cc65).
  NONELIB: /opt/cc65/share/cc65/lib/none.lib
  MAME: /usr/local/bin/mame

jobs:
  tier1-hermetic:
    name: Tier 1 - hermetic build + oracle (no ROMs)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    outputs:
      has_roms: ${{ steps.secret.outputs.has_roms }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install pinned toolchain (cc65 + MAME + AppleCommander + pyte)
        run: bash scripts/setup-toolchain.sh

      - name: Conformance harness selftest
        working-directory: vt100-term-c
        run: python3 client/conformance/selftest.py

      - name: Reference oracle audit (pyte vs authored expect)
        working-directory: vt100-term-c
        run: python3 client/conformance/oracle.py --audit

      - name: Build firmware (VT100.BIN)
        working-directory: vt100-term-c
        run: |
          make build/VT100.BIN
          echo "VT100.BIN sha256:"
          sha256sum build/VT100.BIN

      - name: Detect ROM secret for Tier 2
        id: secret
        run: echo "has_roms=${{ secrets.MAME_ROMS_TGZ_B64 != '' }}" >> "$GITHUB_OUTPUT"

  tier2-mame:
    name: Tier 2 - real MAME conformance
    needs: tier1-hermetic
    if: ${{ needs.tier1-hermetic.outputs.has_roms == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      MAME_ROMS_TGZ_B64: ${{ secrets.MAME_ROMS_TGZ_B64 }}
      SDL_VIDEODRIVER: dummy
      SDL_AUDIODRIVER: dummy
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install pinned toolchain (cc65 + MAME + AppleCommander + pyte)
        run: bash scripts/setup-toolchain.sh

      - name: Provision Apple IIe ROMs (decode private secret + verify)
        run: |
          set -euo pipefail
          romp="$(bash scripts/provision-roms.sh "$RUNNER_TEMP/roms")"
          [ -n "$romp" ] || { echo "ROM provisioning failed"; exit 1; }
          echo "MAME_ROMPATH=$romp" >> "$GITHUB_ENV"

      - name: Build bootable disk image
        working-directory: vt100-term-c
        run: make

      - name: MAME conformance suite
        working-directory: vt100-term-c
        run: python3 client/conformance/runner.py --target mame -v

      - name: Upload conformance report + probe artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: conformance
          path: |
            vt100-term-c/build/conformance.json
            vt100-term-c/build/conf_probe.txt
            vt100-term-c/build/conf_syms.txt
            vt100-term-c/build/vt100.map
            vt100-term-c/build/*.log
          if-no-files-found: ignore
